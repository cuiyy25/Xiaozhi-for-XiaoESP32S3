name: Build Xiaozhi Firmware

on:
  workflow_dispatch:  # 开启手动点击运行功能

permissions:
  contents: read

jobs:
  build:
    name: Build seeedstudio-s3-wifi
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5.2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build current variant
        shell: bash
        run: |
          source $IDF_PATH/export.sh
          # 调用作者的脚本，只编译我们要的这个带有机器脸的板子
          python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: build/merged-binary.bin
