name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      # 回归 v5.3，这是目前小智固件兼容性最强的底座
      image: espressif/idf:release-v5.3
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          
          # 1. 进入源码目录
          cd Source/xiaozhi-esp32-2.2.2
          
          # 2. 【核心修复】恢复可能被搞乱的文件
          git checkout main/idf_component.yml || true
          
          # 3. 【核心修复】只改数字，不删行，确保 YAML 格式绝对安全
          # 把所有的 5.5.2 统一降级为 5.0.0
          echo "正在安全降级版本限制..."
          find . -name "idf_component.yml" -exec sed -i 's/5.5.2/5.0.0/g' {} +
          
          # 4. 开启“无视版本”模式
          export IDF_COMPONENT_MANAGER_IGNORE_IDF_CHECK=1
          
          echo "一切就绪，开始最终编译..."
          python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi
          
          # 5. 检查结果
          ls -l build/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: Source/xiaozhi-esp32-2.2.2/build/*.bin
          if-no-files-found: error
