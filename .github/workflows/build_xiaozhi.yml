name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      # 使用 5.4 版本，它在处理组件依赖时比 5.5 更稳定，且完全能跑通小智的代码
      image: espressif/idf:v5.4
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          
          # 1. 强力开启忽略版本检查模式
          export IDF_COMPONENT_MANAGER_IGNORE_IDF_CHECK=1
          
          # 2. 进入源码目录
          cd Source/xiaozhi-esp32-2.2.2
          
          # 3. 【外科手术】强行剔除所有 4G/拨号相关的冲突组件
          # 只要看到这几个词，直接把整行删掉，WiFi版不需要它们
          echo "正在切除不必要的 4G 依赖项..."
          sed -i '/esp-ml307/d' main/idf_component.yml
          sed -i '/uart-eth-modem/d' main/idf_component.yml
          sed -i '/uart-uhci/d' main/idf_component.yml
          
          # 4. 【版本降级】把剩下的所有版本限制降到 5.0.0，确保万无一失
          echo "正在放宽 IDF 版本限制..."
          find . -name "idf_component.yml" -exec sed -i 's/5.5.2/5.0.0/g' {} +
          
          # 5. 清理可能干扰的旧缓存
          rm -rf dependencies.lock
          
          echo "一切就绪，开始编译..."
          # 执行编译脚本
          python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi
          
          # 6. 检查结果
          ls -l build/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: Source/xiaozhi-esp32-2.2.2/build/*.bin
          if-no-files-found: error
