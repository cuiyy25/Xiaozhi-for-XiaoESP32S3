name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          
          # 1. 进入源码目录
          cd Source/xiaozhi-esp32-2.2.2
          
          # 2. 【大招 1】移除所有导致版本冲突的非必要组件依赖 (4G模块、调制解调器等)
          echo "移除冲突组件..."
          find . -name "idf_component.yml" -exec sed -i '/esp-ml307/d' {} +
          find . -name "idf_component.yml" -exec sed -i '/uart-eth-modem/d' {} +
          find . -name "idf_component.yml" -exec sed -i '/uart-uhci/d' {} +
          
          # 3. 【大招 2】强行把所有 idf 版本要求从 5.5.2 降级到 5.0.0
          echo "强行降级所有版本检查..."
          find . -name "idf_component.yml" -exec sed -i 's/>=5.5.2/>=5.0.0/g' {} +
          find . -name "idf_component.yml" -exec sed -i 's/5.5.2/5.0.0/g' {} +

          # 4. 【大招 3】设置系统环境变量，强行忽略组件管理器的版本锁定
          export IDF_COMPONENT_MANAGER_IGNORE_IDF_CHECK=1
          
          echo "开始最终强制编译..."
          # 将变量注入环境运行
          IDF_COMPONENT_MANAGER_IGNORE_IDF_CHECK=1 python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi
          
          # 5. 验证结果
          echo "检查固件生成情况:"
          ls -l build/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: Source/xiaozhi-esp32-2.2.2/build/*.bin
          if-no-files-found: error
