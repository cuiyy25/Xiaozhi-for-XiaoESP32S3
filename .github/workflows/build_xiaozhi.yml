name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.1
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          source /opt/esp/idf/export.sh
          
          # 直接进入刚才日志里暴露出来的真实代码目录
          if[ -d "Source/xiaozhi-esp32-2.2.2" ]; then
            cd Source/xiaozhi-esp32-2.2.2
            echo "成功进入源码目录！"
          fi
          
          # 这次我发誓绝对加上了空格
          if [ -f "scripts/release.py" ]; then
             echo "-> 使用原作者的高级打包脚本..."
             python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi
          else
             echo "-> 使用基础编译..."
             idf.py set-target esp32s3
             idf.py build
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: |
            **/build/merged-binary.bin
            **/build/xiaozhi.bin
          if-no-files-found: warn
