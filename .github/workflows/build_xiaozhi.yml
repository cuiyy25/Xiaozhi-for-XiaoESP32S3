name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      # 回归 v5.5 镜像，它包含所有必须的内置组件
      image: espressif/idf:v5.5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          
          # 【核心修复 1】设置强力环境变量，强制跳过所有组件的版本检查
          export IDF_COMPONENT_MANAGER_IGNORE_IDF_CHECK=1
          
          # 进入源码目录
          cd Source/xiaozhi-esp32-2.2.2
          
          # 【核心修复 2】只做最基础的文字替换，绝不破坏文件结构
          # 仅仅把 5.5.2 这个数字改成 5.4.0
          echo "正在微调版本限制..."
          find . -name "idf_component.yml" -exec sed -i 's/5.5.2/5.4.0/g' {} +
          
          # 【核心修复 3】清理可能存在的冲突缓存
          rm -f dependencies.lock
          
          echo "开始最终编译..."
          # 执行编译脚本
          python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi
          
          # 检查生成的固件
          echo "检查固件文件位置:"
          ls -l build/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: Source/xiaozhi-esp32-2.2.2/build/*.bin
          if-no-files-found: error
