name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      # 维持使用 5.5 镜像，保证组件库完整
      image: espressif/idf:v5.5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          
          # 【核心修复 1】强行关闭组件管理器的版本检查
          export IDF_COMPONENT_MANAGER_IGNORE_IDF_CHECK=1
          
          # 进入源码目录
          cd Source/xiaozhi-esp32-2.2.2
          
          # 【核心修复 2】同时修改本地文件中的版本限制
          find . -name "idf_component.yml" -exec sed -i 's/5.5.2/5.0.0/g' {} +
          
          echo "开始忽略版本限制进行强制编译..."
          python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi
          
          # 检查结果
          echo "检查生成的固件文件:"
          ls -l build/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          # 确保路径匹配
          path: Source/xiaozhi-esp32-2.2.2/build/*.bin
          if-no-files-found: error
