name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build seeedstudio-s3-wifi
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v5.3.1
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Firmware
        shell: bash
        run: |
          source /opt/esp/idf/export.sh
          # 必须用这句，绝不能出现 idf.py build！
          python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: build/merged-binary.bin
          if-no-files-found: warn
