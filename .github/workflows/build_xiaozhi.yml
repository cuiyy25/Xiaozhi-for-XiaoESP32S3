name: Build Perfect Xiaozhi

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    container:
      # 锁定使用 v5.5 版本，避免 v6.1 的组件缺失问题
      image: espressif/idf:v5.5
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: bash
        run: |
          . /opt/esp/idf/export.sh
          
          # 进入源码目录
          cd Source/xiaozhi-esp32-2.2.2
          
          # 运行编译
          python scripts/release.py seeedstudio-s3-wifi --name seeedstudio-s3-wifi
          
          # 检查结果
          ls -l build/*.bin

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiaozhi_perfect_firmware
          path: Source/xiaozhi-esp32-2.2.2/build/*.bin
          if-no-files-found: error
